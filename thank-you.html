<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application received — Business Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <style>
    .ty-wrap { min-height: 100vh; display: grid; place-items: center; padding: 2rem;
      background: radial-gradient(900px 400px at 50% -10%, rgba(244,180,0,.18), transparent 60%), var(--bg-alt); }
    .ty-card { background: #fff; border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow-lg);
      max-width: 540px; text-align: center; padding: 3rem 2.4rem; }
    .ty-check { width: 84px; height: 84px; margin: 0 auto 1.4rem; border-radius: 50%;
      background: rgba(244,180,0,.16); display: grid; place-items: center; font-size: 2.6rem; }
    .ty-card h1 { font-size: 1.9rem; margin-bottom: .8rem; }
    .ty-card p { color: var(--body); margin-bottom: 1.6rem; }
  </style>
</head>
<body>
  <div class="ty-wrap">
    <div class="ty-card">
      <div class="ty-check">✅</div>
      <h1>Application received!</h1>
      <p>
        Thank you for applying to become a <strong>Business Hub</strong> agent. Your details and
        document have been sent to our team at <strong>businesshub.comke@gmail.com</strong>.
        We will review your application and contact you soon.
      </p>
      <a href="index.html#top" class="btn btn-primary">Back to home</a>
    </div>
  </div>
</body>
</html>
